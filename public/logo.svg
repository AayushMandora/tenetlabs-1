<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="renaissance-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5c0" />
      <stop offset="20%" stop-color="#e0b84c" />
      <stop offset="50%" stop-color="#b8860b" />
      <stop offset="80%" stop-color="#e0b84c" />
      <stop offset="100%" stop-color="#9a6e1a" />
    </linearGradient>
  </defs>
  
  <!-- Outer Astrolabe Concentric Ring with degree markings -->
  <circle cx="256" cy="256" r="210" stroke="url(#renaissance-gold)" stroke-width="4.5" opacity="0.95" />
  <circle cx="256" cy="256" r="195" stroke="url(#renaissance-gold)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.75" />
  <circle cx="256" cy="256" r="185" stroke="url(#renaissance-gold)" stroke-width="0.75" opacity="0.5" />
  
  <!-- Outer Compass Tick Marks -->
  <g stroke="url(#renaissance-gold)" stroke-width="1.5" opacity="0.6">
    <line x1="256" y1="36" x2="256" y2="46" />
    <line x1="256" y1="466" x2="256" y2="476" />
    <line x1="36" y1="256" x2="46" y2="256" />
    <line x1="466" y1="256" x2="476" y2="256" />
  </g>

  <!-- Leonardo's Geometric Star Structure (8-point compass star) -->
  <path d="M256 56 L278 178 L400 200 L278 222 L256 344 L234 222 L112 200 L234 178 Z" stroke="url(#renaissance-gold)" stroke-width="1" opacity="0.3" fill="none" />
  <circle cx="256" cy="200" r="144" stroke="url(#renaissance-gold)" stroke-width="1.25" opacity="0.4" stroke-dasharray="12 8" />

  <!-- Classical Ornate Renaissance Serif Letter T -->
  <g fill="url(#renaissance-gold)">
    <!-- Top Horizontal Crossbar with elegant serifs -->
    <path d="M 145 130 
             H 367 
             V 165 
             C 367 165, 342 165, 332 175 
             C 322 185, 320 200, 320 220 
             V 235 
             H 300 
             V 220 
             C 300 190, 310 178, 320 175
             H 192
             C 202 178, 212 190, 212 220
             V 235
             H 192
             V 220
             C 192 200, 190 185, 180 175
             C 170 165, 145 165, 145 165
             Z" />
    
    <!-- Central Column / Stem -->
    <path d="M 234 165
             H 278
             V 340
             C 278 365, 290 375, 305 378
             V 392
             H 207
             V 378
             C 222 375, 234 365, 234 340
             Z" />
  </g>

  <!-- Ornate Renaissance Vine Filigree / Flourish wrapping the stem -->
  <path d="M 195 240 
           C 205 200, 230 200, 240 230 
           C 250 250, 235 290, 256 310 
           C 270 325, 290 310, 295 290
           C 298 275, 285 260, 280 270" 
        stroke="url(#renaissance-gold)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85" />
        
  <!-- Delicate Leaves on the Vine -->
  <path d="M 220 215 C 215 205, 205 205, 212 218 Z" fill="url(#renaissance-gold)" opacity="0.8" />
  <path d="M 252 250 C 262 250, 260 260, 248 256 Z" fill="url(#renaissance-gold)" opacity="0.8" />
  <path d="M 278 318 C 288 322, 292 312, 282 312 Z" fill="url(#renaissance-gold)" opacity="0.8" />
  
  <!-- Symmetrical flourish on the left -->
  <path d="M 317 280 
           C 307 320, 282 320, 272 290 
           C 262 270, 277 230, 256 210 
           C 242 195, 222 210, 217 230" 
        stroke="url(#renaissance-gold)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.75" />
</svg>
